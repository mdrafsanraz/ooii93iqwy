<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RDistro - Music Distribution Ad (Dark)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0a0a0a;
      font-family: 'Inter', sans-serif;
    }

    .ad-container {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(180deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      position: relative;
      overflow: hidden;
    }

    /* Animated gradient orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: orbFloat 8s ease-in-out infinite;
    }

    .orb-1 {
      width: 500px;
      height: 500px;
      background: rgba(124, 58, 237, 0.4);
      top: -150px;
      left: -150px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 400px;
      height: 400px;
      background: rgba(59, 130, 246, 0.3);
      bottom: -100px;
      right: -100px;
      animation-delay: 2s;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      background: rgba(236, 72, 153, 0.25);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: 4s;
    }

    @keyframes orbFloat {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      33% {
        transform: translate(30px, -30px) scale(1.1);
      }
      66% {
        transform: translate(-20px, 20px) scale(0.95);
      }
    }

    /* Grid pattern overlay */
    .grid-pattern {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    /* Content */
    .content {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      text-align: center;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 30px;
      animation: fadeInScale 1s ease-out;
    }

    @keyframes fadeInScale {
      0% {
        opacity: 0;
        transform: scale(0.8);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .logo-icon {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .logo-icon::before {
      content: '';
      position: absolute;
      inset: -3px;
      background: linear-gradient(135deg, #7c3aed, #ec4899, #3b82f6, #7c3aed);
      border-radius: 23px;
      z-index: -1;
      animation: borderRotate 3s linear infinite;
      background-size: 300% 300%;
    }

    @keyframes borderRotate {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .wave-bars {
      display: flex;
      align-items: center;
      gap: 5px;
      height: 40px;
    }

    .wave-bar {
      width: 8px;
      background: white;
      border-radius: 4px;
      animation: waveBar 1s ease-in-out infinite;
    }

    .wave-bar:nth-child(1) { height: 15px; animation-delay: 0s; }
    .wave-bar:nth-child(2) { height: 30px; animation-delay: 0.15s; }
    .wave-bar:nth-child(3) { height: 40px; animation-delay: 0.3s; }
    .wave-bar:nth-child(4) { height: 25px; animation-delay: 0.45s; }

    @keyframes waveBar {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.5); }
    }

    .logo-text {
      font-size: 64px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #e0e7ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Main headline */
    .headline {
      font-size: 56px;
      font-weight: 800;
      color: white;
      line-height: 1.1;
      margin-bottom: 20px;
      animation: slideUp 0.8s ease-out 0.3s both;
    }

    .headline span {
      background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @keyframes slideUp {
      0% {
        opacity: 0;
        transform: translateY(40px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .subheadline {
      font-size: 24px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 50px;
      animation: slideUp 0.8s ease-out 0.5s both;
    }

    /* Platform icons */
    .platforms {
      display: flex;
      gap: 20px;
      margin-bottom: 50px;
      animation: slideUp 0.8s ease-out 0.7s both;
    }

    .platform {
      width: 100px;
      height: 100px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s ease;
      animation: platformReveal 0.5s ease-out both;
    }

    .platform:nth-child(1) { animation-delay: 0.9s; }
    .platform:nth-child(2) { animation-delay: 1.0s; }
    .platform:nth-child(3) { animation-delay: 1.1s; }
    .platform:nth-child(4) { animation-delay: 1.2s; }
    .platform:nth-child(5) { animation-delay: 1.3s; }
    .platform:nth-child(6) { animation-delay: 1.4s; }

    @keyframes platformReveal {
      0% {
        opacity: 0;
        transform: translateY(20px) scale(0.9);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .platform:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-5px);
      border-color: rgba(124, 58, 237, 0.5);
    }

    .platform-icon {
      font-size: 32px;
    }

    .platform-name {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Features */
    .features {
      display: flex;
      gap: 60px;
      margin-bottom: 50px;
      animation: slideUp 0.8s ease-out 1.5s both;
    }

    .feature {
      text-align: center;
    }

    .feature-value {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, #7c3aed 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .feature-label {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 5px;
    }

    /* CTA Button */
    .cta-button {
      background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
      color: white;
      font-size: 24px;
      font-weight: 700;
      padding: 22px 50px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      animation: slideUp 0.8s ease-out 1.7s both;
      transition: transform 0.3s ease;
    }

    .cta-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmer 2s infinite 2s;
    }

    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .cta-button:hover {
      transform: scale(1.05);
    }

    /* Bottom text */
    .bottom-text {
      position: absolute;
      bottom: 50px;
      font-size: 18px;
      color: rgba(255, 255, 255, 0.4);
      animation: fadeIn 1s ease-out 2s both;
    }

    .bottom-text a {
      color: #7c3aed;
      text-decoration: none;
      font-weight: 600;
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="ad-container">
    <!-- Background effects -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-pattern"></div>

    <!-- Content -->
    <div class="content">
      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon">
          <div class="wave-bars">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
          </div>
        </div>
        <span class="logo-text">RDistro</span>
      </div>

      <!-- Headlines -->
      <h1 class="headline">
        Get Your Music on<br><span>Every Platform</span>
      </h1>
      <p class="subheadline">One upload. Global distribution. Keep 100% royalties.</p>

      <!-- Platforms -->
      <div class="platforms">
        <div class="platform">
          <div class="platform-icon">🎧</div>
          <div class="platform-name">Spotify</div>
        </div>
        <div class="platform">
          <div class="platform-icon">🍎</div>
          <div class="platform-name">Apple</div>
        </div>
        <div class="platform">
          <div class="platform-icon">▶️</div>
          <div class="platform-name">YouTube</div>
        </div>
        <div class="platform">
          <div class="platform-icon">📱</div>
          <div class="platform-name">TikTok</div>
        </div>
        <div class="platform">
          <div class="platform-icon">🛒</div>
          <div class="platform-name">Amazon</div>
        </div>
        <div class="platform">
          <div class="platform-icon">🌊</div>
          <div class="platform-name">Tidal</div>
        </div>
      </div>

      <!-- Features -->
      <div class="features">
        <div class="feature">
          <div class="feature-value">$5</div>
          <div class="feature-label">Artist / Year</div>
        </div>
        <div class="feature">
          <div class="feature-value">$20</div>
          <div class="feature-label">Label / Year</div>
        </div>
        <div class="feature">
          <div class="feature-value">450+</div>
          <div class="feature-label">Platforms</div>
        </div>
      </div>

      <!-- CTA -->
      <button class="cta-button">Start Free Trial →</button>

      <!-- Bottom -->
      <p class="bottom-text">
        <a href="https://rdistro.net">rdistro.net</a> • Music Distribution Made Simple
      </p>
    </div>
  </div>
</body>
</html>
