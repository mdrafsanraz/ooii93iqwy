<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RDistro - Music Distribution Ad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a1a;
      font-family: 'Space Grotesk', sans-serif;
    }

    .ad-container {
      width: 1080px;
      height: 1080px;
      background: #ffffff;
      position: relative;
      overflow: hidden;
    }

    /* Background pattern */
    .bg-pattern {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 80%, rgba(124, 58, 237, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(124, 58, 237, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(124, 58, 237, 0.02) 0%, transparent 70%);
    }

    /* Floating music notes */
    .music-note {
      position: absolute;
      font-size: 40px;
      opacity: 0;
      animation: floatUp 4s ease-in-out infinite;
    }

    .music-note:nth-child(1) { left: 10%; animation-delay: 0s; }
    .music-note:nth-child(2) { left: 25%; animation-delay: 0.8s; }
    .music-note:nth-child(3) { left: 40%; animation-delay: 1.6s; }
    .music-note:nth-child(4) { left: 55%; animation-delay: 2.4s; }
    .music-note:nth-child(5) { left: 70%; animation-delay: 3.2s; }
    .music-note:nth-child(6) { left: 85%; animation-delay: 0.4s; }

    @keyframes floatUp {
      0% {
        bottom: -50px;
        opacity: 0;
        transform: translateX(0) rotate(0deg);
      }
      20% {
        opacity: 0.15;
      }
      80% {
        opacity: 0.15;
      }
      100% {
        bottom: 110%;
        opacity: 0;
        transform: translateX(20px) rotate(15deg);
      }
    }

    /* Content wrapper */
    .content {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }

    /* Logo */
    .logo-container {
      margin-bottom: 40px;
      animation: fadeInDown 1s ease-out;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 40px rgba(124, 58, 237, 0.3);
      animation: pulse 2s ease-in-out infinite;
    }

    .logo-bars {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 50px;
    }

    .logo-bar {
      width: 10px;
      background: white;
      border-radius: 5px;
      animation: barPulse 1.2s ease-in-out infinite;
    }

    .logo-bar:nth-child(1) { height: 20px; animation-delay: 0s; }
    .logo-bar:nth-child(2) { height: 35px; animation-delay: 0.2s; }
    .logo-bar:nth-child(3) { height: 50px; animation-delay: 0.4s; }
    .logo-bar:nth-child(4) { height: 30px; animation-delay: 0.6s; }

    @keyframes barPulse {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.6); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .logo-text {
      font-size: 72px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -2px;
    }

    /* Tagline */
    .tagline {
      font-size: 32px;
      color: #64748b;
      margin-bottom: 60px;
      text-align: center;
      animation: fadeInUp 1s ease-out 0.3s both;
    }

    /* Platforms grid */
    .platforms {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 30px;
      margin-bottom: 60px;
      animation: fadeInUp 1s ease-out 0.6s both;
    }

    .platform {
      width: 120px;
      height: 120px;
      background: #f8fafc;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 2px solid #e2e8f0;
      transition: all 0.3s ease;
      animation: platformPop 0.5s ease-out both;
    }

    .platform:nth-child(1) { animation-delay: 0.8s; }
    .platform:nth-child(2) { animation-delay: 0.9s; }
    .platform:nth-child(3) { animation-delay: 1.0s; }
    .platform:nth-child(4) { animation-delay: 1.1s; }
    .platform:nth-child(5) { animation-delay: 1.2s; }

    @keyframes platformPop {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .platform:hover {
      transform: translateY(-5px);
      border-color: #7c3aed;
      box-shadow: 0 10px 30px rgba(124, 58, 237, 0.15);
    }

    .platform-icon {
      font-size: 40px;
    }

    .platform-name {
      font-size: 14px;
      font-weight: 600;
      color: #0f172a;
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 80px;
      margin-bottom: 60px;
      animation: fadeInUp 1s ease-out 1.4s both;
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-size: 64px;
      font-weight: 700;
      color: #7c3aed;
      line-height: 1;
      animation: countUp 2s ease-out 1.6s both;
    }

    @keyframes countUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .stat-label {
      font-size: 20px;
      color: #64748b;
      margin-top: 10px;
    }

    /* CTA */
    .cta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeInUp 1s ease-out 1.8s both;
    }

    .cta-button {
      background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
      color: white;
      font-size: 28px;
      font-weight: 600;
      padding: 24px 60px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      box-shadow: 0 20px 40px rgba(124, 58, 237, 0.3);
      transition: all 0.3s ease;
      animation: ctaPulse 2s ease-in-out infinite 2s;
    }

    @keyframes ctaPulse {
      0%, 100% {
        box-shadow: 0 20px 40px rgba(124, 58, 237, 0.3);
      }
      50% {
        box-shadow: 0 25px 50px rgba(124, 58, 237, 0.4);
      }
    }

    .cta-button:hover {
      transform: translateY(-3px);
    }

    .cta-sub {
      font-size: 20px;
      color: #64748b;
    }

    .cta-sub span {
      color: #10b981;
      font-weight: 600;
    }

    /* More platforms text */
    .more-platforms {
      position: absolute;
      bottom: 60px;
      font-size: 24px;
      color: #94a3b8;
      animation: fadeIn 1s ease-out 2s both;
    }

    .more-platforms span {
      color: #7c3aed;
      font-weight: 600;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Decorative elements */
    .deco-circle {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(124, 58, 237, 0.1);
      animation: rotate 20s linear infinite;
    }

    .deco-circle-1 {
      width: 600px;
      height: 600px;
      top: -200px;
      right: -200px;
    }

    .deco-circle-2 {
      width: 400px;
      height: 400px;
      bottom: -100px;
      left: -100px;
      animation-direction: reverse;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="ad-container">
    <!-- Background elements -->
    <div class="bg-pattern"></div>
    <div class="deco-circle deco-circle-1"></div>
    <div class="deco-circle-2 deco-circle"></div>
    
    <!-- Floating music notes -->
    <div class="music-note">🎵</div>
    <div class="music-note">🎶</div>
    <div class="music-note">🎵</div>
    <div class="music-note">🎶</div>
    <div class="music-note">🎵</div>
    <div class="music-note">🎶</div>

    <!-- Main content -->
    <div class="content">
      <!-- Logo -->
      <div class="logo-container">
        <div class="logo">
          <div class="logo-icon">
            <div class="logo-bars">
              <div class="logo-bar"></div>
              <div class="logo-bar"></div>
              <div class="logo-bar"></div>
              <div class="logo-bar"></div>
            </div>
          </div>
          <div class="logo-text">RDistro</div>
        </div>
      </div>

      <!-- Tagline -->
      <p class="tagline">Distribute Your Music Worldwide</p>

      <!-- Platforms -->
      <div class="platforms">
        <div class="platform">
          <div class="platform-icon">🎧</div>
          <div class="platform-name">Spotify</div>
        </div>
        <div class="platform">
          <div class="platform-icon">🍎</div>
          <div class="platform-name">Apple Music</div>
        </div>
        <div class="platform">
          <div class="platform-icon">▶️</div>
          <div class="platform-name">YouTube</div>
        </div>
        <div class="platform">
          <div class="platform-icon">🛒</div>
          <div class="platform-name">Amazon</div>
        </div>
        <div class="platform">
          <div class="platform-icon">🎵</div>
          <div class="platform-name">Deezer</div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <div class="stat-number">450+</div>
          <div class="stat-label">Platforms</div>
        </div>
        <div class="stat">
          <div class="stat-number">$5</div>
          <div class="stat-label">Per Year</div>
        </div>
        <div class="stat">
          <div class="stat-number">100%</div>
          <div class="stat-label">Royalties</div>
        </div>
      </div>

      <!-- CTA -->
      <div class="cta">
        <button class="cta-button">Start Distributing</button>
        <p class="cta-sub"><span>Free Trial</span> for Labels</p>
      </div>

      <!-- More platforms -->
      <p class="more-platforms">Tidal, TikTok, Instagram, Pandora & <span>450+ more</span></p>
    </div>
  </div>
</body>
</html>
